<section class="dashboard-section dashboard-section-compact" id="verification">
    <div class="dashboard-section-heading">
        <div>
            <p class="dashboard-section-eyebrow">Verification</p>
            <h2>Compliance and trust</h2>
        </div>
    </div>

    <div class="dashboard-verification-grid">
        {% for item in verification_items %}
            <article class="dashboard-verification-card">
                <div>
                    <p class="workspace-label">Trust signal</p>
                    <h3>{{ item.label }}</h3>
                    <p>{{ item.description }}</p>
                </div>
                <span class="dashboard-badge dashboard-badge-{{ item.tone }}">{{ item.value }}</span>
            </article>
        {% endfor %}
    </div>

    {% if verification_cta %}
        <div class="dashboard-section-footer">
            <a href="{{ verification_cta.href }}" class="btn btn-secondary btn-compact">{{ verification_cta.label }}</a>
        </div>
    {% endif %}
</section>
